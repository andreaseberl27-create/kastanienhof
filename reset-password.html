<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ripelog · Passwort zurücksetzen</title>
<link rel="icon" href="logo.png">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
:root {
  --dunkel: #f5f0e8;
  --mittel: #ede8df;
  --border: rgba(45,90,39,.18);
  --text: #1a1a1a;
  --text-dim: #7a6a55;
  --rot: #e8244a;
  --rot-dunkel: #c0392b;
  --gruen: #2d5a27;
  --accent: #2d5a27;
  --shadow: 0 8px 32px rgba(0,0,0,.10);
}
body {
  font-family:'Inter',sans-serif; background:var(--dunkel);
  min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px;
}
.card {
  width:100%; max-width:380px; background:#fff;
  border-radius:20px; padding:36px 32px; box-shadow:var(--shadow);
}
.logo { text-align:center; margin-bottom:8px; }
.logo img { width:64px; height:64px; object-fit:contain; }
.title { font-family:'Syne',sans-serif; font-size:22px; font-weight:800; text-align:center; margin-bottom:4px; }
.sub { font-size:13px; color:var(--text-dim); text-align:center; margin-bottom:28px; }
.field { margin-bottom:16px; }
.field label { font-size:11px; font-weight:700; letter-spacing:1px; text-transform:uppercase; color:var(--text-dim); display:block; margin-bottom:7px; }
.field input {
  width:100%; background:var(--dunkel); border:1.5px solid var(--border);
  border-radius:12px; padding:13px 14px; font-family:'Inter',sans-serif;
  font-size:15px; color:var(--text); outline:none; transition:border-color .2s;
}
.field input:focus { border-color:var(--accent); }
.btn {
  width:100%; padding:15px; border-radius:12px; border:none; margin-top:8px;
  background:linear-gradient(135deg,var(--rot),var(--rot-dunkel));
  color:#fff; font-family:'Syne',sans-serif; font-size:15px; font-weight:700;
  cursor:pointer; transition:all .15s; box-shadow:0 6px 20px rgba(232,36,74,.3);
}
.btn:hover { opacity:.92; }
.btn:disabled { opacity:.6; cursor:default; }
.msg {
  font-size:13px; text-align:center; min-height:18px; margin:12px 0 4px;
  padding:10px 14px; border-radius:10px; display:none;
}
.msg.error { background:rgba(232,36,74,.08); color:var(--rot-dunkel); display:block; }
.msg.success { background:rgba(45,90,39,.08); color:var(--gruen); display:block; }
.back { display:block; text-align:center; margin-top:18px; font-size:12px; color:var(--text-dim); text-decoration:none; }
.back:hover { color:var(--accent); }
.hint { font-size:12px; color:var(--text-dim); margin-top:5px; }
</style>
<script src="config.js"></script>
<script src="https://browser.sentry-cdn.com/8.38.0/bundle.min.js" crossorigin="anonymous"></script>
<script>Sentry.init({ dsn: window.RIPELOG_CONFIG.sentryDsn, environment: window.RIPELOG_CONFIG.sentryEnv, release: window.RIPELOG_CONFIG.release });</script>
</head>
<body>

<div class="card" id="card">
  <div class="logo"><img src="logo.png" alt="Ripelog"></div>
  <div class="title">Neues Passwort</div>
  <div class="sub" id="subtext">Bitte wählen Sie ein neues Passwort.</div>

  <div id="formSection">
    <div class="field">
      <label>Neues Passwort</label>
      <input type="password" id="pw1" placeholder="Mindestens 8 Zeichen" autocomplete="new-password"
             oninput="checkStrength()" onkeydown="if(event.key==='Enter')document.getElementById('pw2').focus()">
      <div class="hint" id="strengthHint"></div>
    </div>
    <div class="field">
      <label>Passwort bestätigen</label>
      <input type="password" id="pw2" placeholder="Passwort wiederholen" autocomplete="new-password"
             onkeydown="if(event.key==='Enter')submit()">
    </div>
    <div class="msg" id="msg"></div>
    <button class="btn" id="btn" onclick="submit()">Passwort speichern</button>
    <a class="back" id="backLink" href="#">← Zurück zum Login</a>
  </div>

  <div id="successSection" style="display:none; text-align:center; padding:8px 0">
    <div style="font-size:48px; margin-bottom:16px">✅</div>
    <div style="font-family:'Syne',sans-serif; font-weight:700; font-size:17px; margin-bottom:8px">Passwort gespeichert</div>
    <div style="font-size:13px; color:var(--text-dim); margin-bottom:24px">Sie können sich jetzt mit dem neuen Passwort anmelden.</div>
    <a class="btn" id="loginLink" href="#" style="display:inline-block; text-decoration:none; text-align:center">Zum Login</a>
  </div>
</div>

<script>
const SUPABASE_URL = window.RIPELOG_CONFIG.supabaseUrl;
const SUPABASE_KEY = window.RIPELOG_CONFIG.supabaseKey;

// Login-URL: aktuelle Subdomain oder Fallback
function loginUrl() {
  return 'admin.html';
}

document.getElementById('backLink').href = loginUrl();
document.getElementById('loginLink').href = loginUrl();

// Token aus URL-Hash lesen (Supabase sendet: #access_token=...&type=recovery)
function getTokenFromHash() {
  const hash = window.location.hash.substring(1);
  const params = Object.fromEntries(new URLSearchParams(hash));
  return params;
}

const params = getTokenFromHash();

if (!params.access_token || params.type !== 'recovery') {
  document.getElementById('subtext').textContent = 'Dieser Link ist ungültig oder abgelaufen.';
  document.getElementById('formSection').innerHTML =
    `<div class="msg error" style="display:block">Bitte fordern Sie einen neuen Passwort-Reset-Link an.</div>
     <a class="back" href="${loginUrl()}">← Zum Login</a>`;
}

function checkStrength() {
  const pw = document.getElementById('pw1').value;
  const hint = document.getElementById('strengthHint');
  if (!pw) { hint.textContent = ''; return; }
  if (pw.length < 8) { hint.style.color = 'var(--rot)'; hint.textContent = 'Zu kurz (mind. 8 Zeichen)'; }
  else if (pw.length < 12) { hint.style.color = '#c87c00'; hint.textContent = 'Akzeptabel'; }
  else { hint.style.color = 'var(--gruen)'; hint.textContent = 'Sicheres Passwort ✓'; }
}

async function submit() {
  const pw1 = document.getElementById('pw1').value;
  const pw2 = document.getElementById('pw2').value;
  const msg = document.getElementById('msg');
  const btn = document.getElementById('btn');

  msg.className = 'msg';
  if (pw1.length < 8) { msg.className = 'msg error'; msg.textContent = 'Passwort muss mindestens 8 Zeichen haben.'; return; }
  if (pw1 !== pw2)    { msg.className = 'msg error'; msg.textContent = 'Passwörter stimmen nicht überein.'; return; }

  btn.textContent = 'Speichern…'; btn.disabled = true;
  try {
    const res = await fetch(`${SUPABASE_URL}/auth/v1/user`, {
      method: 'PUT',
      headers: {
        'apikey': SUPABASE_KEY,
        'Authorization': `Bearer ${params.access_token}`,
        'Content-Type': 'application/json',
      },
      body: JSON.stringify({ password: pw1 }),
    });
    if (!res.ok) {
      const err = await res.json();
      throw new Error(err.message || `HTTP ${res.status}`);
    }
    document.getElementById('formSection').style.display = 'none';
    document.getElementById('successSection').style.display = 'block';
  } catch(e) {
    msg.className = 'msg error';
    msg.textContent = 'Fehler: ' + e.message;
    btn.textContent = 'Passwort speichern'; btn.disabled = false;
  }
}
</script>
</body>
</html>
