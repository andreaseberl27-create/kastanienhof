[build]
  command = "bash build.sh"
  publish = "."

# ── PRODUCTION (main branch) ──────────────────────────────────
[context.production.environment]
  SENTRY_ENV      = "production"
  RELEASE_VERSION = "ripelog@1.0.0"
  # SUPABASE_URL, SUPABASE_KEY, SENTRY_DSN → in Netlify UI gesetzt (nicht im Repo)

# ── INT / DEVELOP (develop branch + alle Branch-Deploys) ──────
# Playwright-Smoke-Tests laufen nach dem Build gegen PLAYWRIGHT_BASE_URL.
# PLAYWRIGHT_BASE_URL muss in den Netlify-Einstellungen für diesen Context
# auf die stabile INT-URL gesetzt werden, z.B.:
#   https://develop--<dein-site-name>.netlify.app
# TEST_EMAIL / TEST_PASSWORD ebenfalls in den Netlify-Einstellungen setzen.
[context.branch-deploy]
  command = "bash build.sh && cd tests && npm ci && npx playwright install --with-deps chromium && npx playwright test --reporter=line"

[context.branch-deploy.environment]
  SENTRY_ENV      = "develop"
  RELEASE_VERSION = "ripelog@develop"
  # SUPABASE_URL, SUPABASE_KEY → INT-Projekt-Werte in Netlify UI gesetzt
  # SENTRY_DSN → selbes DSN wie prod, nur environment-Tag wechselt
  # PLAYWRIGHT_BASE_URL → stabile INT-URL, in Netlify UI gesetzt
  # TEST_EMAIL / TEST_PASSWORD → in Netlify UI gesetzt
