<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Harvio · Admin</title>
<link rel="icon" href="logo.png">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
:root {
  --bg: #f5f0e8; --surface: #fff; --border: rgba(45,90,39,.18);
  --text: #1a1a1a; --dim: #7a6a55;
  --primary: #c0392b; --primary-dk: #922b21;
  --green: #2d5a27; --green-bright: #4a8c42; --red: #c0392b; --orange: #c05c1a;
  --sidebar: #1c2b1a; --sidebar-dim: #8aaa85;
  --shadow: 0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.05);
  --shadow-lg: 0 10px 25px rgba(0,0,0,.12);
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Inter',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }

/* ── Login ── */
#loginPage {
  min-height:100vh; display:flex; align-items:center; justify-content:center;
  background:var(--bg);
}
.login-card {
  background:var(--surface); border-radius:16px; padding:40px; width:360px;
  box-shadow:var(--shadow-lg); border:1px solid var(--border);
}
.login-logo { margin-bottom:8px; }
.login-logo img { width:64px; height:64px; object-fit:contain; }
.login-title { font-size:20px; font-weight:700; margin-bottom:4px; }
.login-sub { font-size:13px; color:var(--dim); margin-bottom:28px; }
.form-group { margin-bottom:16px; }
.form-label { display:block; font-size:12px; font-weight:600; color:var(--dim);
  text-transform:uppercase; letter-spacing:.5px; margin-bottom:6px; }
.form-input {
  width:100%; padding:10px 12px; border:1px solid var(--border); border-radius:8px;
  font-size:14px; font-family:inherit; color:var(--text); outline:none; transition:border-color .15s;
}
.form-input:focus { border-color:var(--primary); }
.btn-primary {
  width:100%; padding:11px; background:var(--primary); color:#fff; border:none;
  border-radius:8px; font-size:14px; font-weight:600; cursor:pointer; transition:background .15s;
}
.btn-primary:hover { background:var(--primary-dk); }
.login-error { font-size:13px; color:var(--red); margin-top:10px; min-height:18px; }

/* ── App shell ── */
#appPage { display:none; }
.app-layout { display:flex; min-height:100vh; }

/* ── Sidebar ── */
aside {
  width:240px; background:var(--sidebar); position:fixed; top:0; left:0;
  height:100vh; display:flex; flex-direction:column; z-index:10;
}
.sidebar-logo {
  padding:20px 20px 18px; border-bottom:1px solid rgba(255,255,255,.08);
  font-size:18px; font-weight:700; color:#fff; display:flex; align-items:center; gap:10px;
  font-family:'Syne',sans-serif; letter-spacing:.3px;
}
.sidebar-logo img { width:32px; height:32px; object-fit:contain; border-radius:6px; }
.sidebar-nav { flex:1; padding:12px 0; overflow-y:auto; }
.nav-item {
  display:flex; align-items:center; gap:10px; padding:10px 20px;
  color:var(--sidebar-dim); font-size:14px; font-weight:500; cursor:pointer;
  transition:background .15s, color .15s; border-radius:0;
}
.nav-item:hover { background:rgba(255,255,255,.05); color:#fff; }
.nav-item.active { background:rgba(74,140,66,.18); color:#fff; border-left:3px solid var(--green-bright); }
.nav-item .icon { font-size:16px; width:20px; text-align:center; }
.sidebar-user {
  padding:16px 20px; border-top:1px solid rgba(255,255,255,.08);
  font-size:13px; color:var(--sidebar-dim);
}
.sidebar-username { color:#fff; font-weight:600; margin-bottom:6px; }
.btn-logout {
  background:rgba(255,255,255,.08); border:none; color:var(--sidebar-dim);
  padding:6px 12px; border-radius:6px; font-size:12px; cursor:pointer; transition:background .15s;
}
.btn-logout:hover { background:rgba(255,255,255,.15); color:#fff; }

/* ── Main content ── */
main { margin-left:240px; flex:1; padding:32px; }
.page-header {
  display:flex; align-items:center; justify-content:space-between; margin-bottom:24px;
}
.page-title { font-size:22px; font-weight:700; font-family:'Syne',sans-serif; }
.page-title small { font-size:13px; font-weight:400; color:var(--dim); margin-left:8px; }
.btn-add {
  background:var(--primary); color:#fff; border:none; padding:9px 18px;
  border-radius:8px; font-size:14px; font-weight:600; cursor:pointer; transition:background .15s;
  display:flex; align-items:center; gap:6px;
}
.btn-add:hover { background:var(--primary-dk); }

/* ── Table ── */
.table-card { background:var(--surface); border-radius:12px; box-shadow:var(--shadow); overflow:hidden; }
table { width:100%; border-collapse:collapse; }
thead { background:var(--bg); }
th { padding:12px 16px; text-align:left; font-size:11px; font-weight:700; color:var(--dim);
  text-transform:uppercase; letter-spacing:.8px; border-bottom:1px solid var(--border); }
td { padding:12px 16px; font-size:14px; border-bottom:1px solid var(--border); }
tr:last-child td { border-bottom:none; }
tbody tr:hover { background:#faf6ee; }
.badge {
  display:inline-flex; align-items:center; gap:4px; padding:2px 8px;
  border-radius:99px; font-size:11px; font-weight:600;
}
.badge-green { background:#dcfce7; color:var(--green); }
.badge-red { background:#fee2e2; color:var(--red); }
.badge-blue { background:#d6f0d6; color:var(--green); }
.badge-orange { background:#fdebd0; color:var(--orange); }
.badge-nr {
  font-family:'SF Mono',monospace; background:var(--bg); color:var(--dim);
  padding:2px 8px; border-radius:6px; font-size:13px; font-weight:700;
  border:1px solid var(--border);
}
.actions { display:flex; gap:6px; }
.btn-icon {
  background:none; border:1px solid var(--border); border-radius:6px; padding:5px 9px;
  font-size:13px; cursor:pointer; color:var(--dim); transition:all .15s;
}
.btn-icon:hover { background:var(--bg); color:var(--text); }
.btn-icon.del:hover { border-color:var(--red); color:var(--red); }
.btn-icon.qr:hover { border-color:var(--primary); color:var(--primary); }
.empty-row td { text-align:center; padding:32px; color:var(--dim); font-size:14px; }
.color-dot { width:14px; height:14px; border-radius:50%; display:inline-block; vertical-align:middle; }

/* ── Modal ── */
.overlay {
  position:fixed; inset:0; background:rgba(0,0,0,.5); z-index:100;
  display:flex; align-items:center; justify-content:center; padding:20px;
}
.overlay.hidden { display:none; }
.modal-card {
  background:var(--surface); border-radius:16px; padding:28px; width:100%;
  max-width:460px; box-shadow:var(--shadow-lg); max-height:90vh; overflow-y:auto;
}
.modal-title { font-size:17px; font-weight:700; margin-bottom:20px; }
.modal-grid { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
.modal-grid .full { grid-column:1/-1; }
.modal-btns { display:flex; gap:10px; margin-top:20px; }
.btn-save {
  flex:1; padding:10px; background:var(--primary); color:#fff; border:none;
  border-radius:8px; font-size:14px; font-weight:600; cursor:pointer;
}
.btn-save:hover { background:var(--primary-dk); }
.btn-cancel {
  padding:10px 18px; background:var(--bg); color:var(--text); border:1px solid var(--border);
  border-radius:8px; font-size:14px; font-weight:600; cursor:pointer;
}
.form-check { display:flex; align-items:center; gap:8px; font-size:14px; cursor:pointer; }
.form-check input { width:16px; height:16px; accent-color:var(--primary); cursor:pointer; }
.modal-nr-hint { font-size:12px; color:var(--dim); margin-top:4px; }

/* ── QR Modal ── */
.qr-modal-card { background:var(--surface); border-radius:16px; padding:28px; width:100%;
  max-width:520px; box-shadow:var(--shadow-lg); }
.qr-preview { display:flex; flex-wrap:wrap; gap:12px; margin:16px 0;
  max-height:300px; overflow-y:auto; padding:4px; }
.qr-preview-label {
  border:1px solid var(--border); border-radius:8px; padding:10px;
  display:flex; align-items:center; gap:10px; font-size:12px;
  background:#fafafa; width:220px;
}
.qr-preview-info .name { font-weight:700; font-size:13px; }
.qr-preview-info .nr { color:var(--dim); font-family:monospace; }
.qr-settings { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:16px; }
.qr-settings label { font-size:12px; color:var(--dim); display:block; margin-bottom:4px; }

/* ── Print labels ── */
#printArea { display:none; }
@media print {
  body > * { display:none !important; }
  #printArea { display:block !important; }
  @page { margin:8mm; size:A4; }
}
.label-sheet { display:flex; flex-wrap:wrap; gap:4mm; align-content:flex-start; }
.label {
  width:70mm; height:38mm; border:0.5pt solid #aaa; border-radius:2mm;
  display:flex; align-items:center; gap:3mm; padding:3mm;
  font-family:Arial,sans-serif; page-break-inside:avoid; overflow:hidden;
}
.label-qr { flex-shrink:0; }
.label-text { flex:1; min-width:0; }
.label-name { font-size:10pt; font-weight:bold; line-height:1.2; margin-bottom:2mm; word-break:break-word; }
.label-ma { font-size:11pt; font-weight:bold; color:#333; }
.label-lfd { font-size:9pt; color:#666; margin-top:1mm; }
.label-app { font-size:7pt; color:#aaa; margin-top:2mm; }

/* ── Tooltips ── */
[data-tip] { position:relative; }
[data-tip]::after {
  content: attr(data-tip);
  position:absolute; bottom:calc(100% + 6px); left:50%; transform:translateX(-50%);
  background:#1e293b; color:#fff; font-size:12px; line-height:1.4;
  padding:6px 10px; border-radius:7px; white-space:nowrap;
  pointer-events:none; opacity:0; transition:opacity .15s;
  z-index:9999; box-shadow:0 4px 12px rgba(0,0,0,.25);
}
[data-tip]::before {
  content:''; position:absolute; bottom:calc(100% + 1px); left:50%; transform:translateX(-50%);
  border:5px solid transparent; border-top-color:#1e293b;
  pointer-events:none; opacity:0; transition:opacity .15s; z-index:9999;
}
[data-tip]:hover::after, [data-tip]:hover::before { opacity:1; }
/* Sidebar-Tooltips rechts statt oben */
.nav-item[data-tip]::after {
  bottom:auto; top:50%; left:calc(100% + 10px); transform:translateY(-50%);
}
.nav-item[data-tip]::before {
  bottom:auto; top:50%; left:calc(100% + 0px);
  transform:translateY(-50%) rotate(-90deg);
  border-top-color:#1e293b;
}
/* Tooltips die nach unten gehen (z.B. bei Elementen ganz oben) */
[data-tip-down]::after {
  bottom:auto; top:calc(100% + 6px);
}
[data-tip-down]::before {
  bottom:auto; top:calc(100% + 1px);
  border-top-color:transparent; border-bottom-color:#1e293b;
}

/* ── Dashboard ── */
.table-card.dash-mode { background:transparent; border-radius:0; box-shadow:none; overflow:visible; }
.dash-filter {
  background:var(--surface); border-radius:12px; box-shadow:var(--shadow);
  padding:14px 18px; margin-bottom:20px;
  display:flex; align-items:center; gap:12px; flex-wrap:wrap;
}
.dash-filter.hidden { display:none; }
.dash-filter label { font-size:12px; font-weight:600; color:var(--dim); white-space:nowrap; }
.dash-filter .form-input { width:auto; padding:7px 10px; font-size:13px; }
.dash-quick { display:flex; gap:6px; flex-wrap:wrap; }
.btn-quick {
  padding:6px 12px; border:1px solid var(--border); border-radius:6px;
  font-size:12px; font-weight:600; cursor:pointer; background:var(--bg);
  color:var(--dim); transition:all .15s;
}
.btn-quick:hover, .btn-quick.active { background:var(--primary); color:#fff; border-color:var(--primary); }
.kpi-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(160px,1fr)); gap:14px; margin-bottom:20px; }
.kpi-card {
  background:var(--surface); border-radius:12px; box-shadow:var(--shadow);
  padding:18px 20px;
}
.kpi-label { font-size:11px; font-weight:700; color:var(--dim); text-transform:uppercase; letter-spacing:.6px; margin-bottom:6px; }
.kpi-value { font-size:28px; font-weight:700; color:var(--text); line-height:1; }
.kpi-value small { font-size:14px; font-weight:500; color:var(--dim); }
.kpi-sub { font-size:12px; color:var(--dim); margin-top:4px; }
.dash-grid { display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-bottom:16px; }
@media(max-width:900px){ .dash-grid { grid-template-columns:1fr; } }
.dash-card {
  background:var(--surface); border-radius:12px; box-shadow:var(--shadow); padding:20px;
}
.dash-card-title {
  font-size:13px; font-weight:700; color:var(--text); margin-bottom:14px;
  display:flex; align-items:center; gap:6px;
}
.dash-card-title span { font-size:16px; }
.bar-row { display:flex; align-items:center; gap:10px; margin-bottom:8px; }
.bar-row:last-child { margin-bottom:0; }
.bar-label { font-size:12px; color:var(--text); min-width:100px; max-width:130px;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis; flex-shrink:0; }
.bar-track { flex:1; background:var(--bg); border-radius:99px; height:20px; position:relative; overflow:hidden; border:1px solid var(--border); }
.bar-fill { height:100%; border-radius:99px; background:var(--primary); transition:width .4s ease; min-width:2px; }
.bar-fill.green { background:var(--green); }
.bar-fill.blue  { background:#3b82f6; }
.bar-fill.orange{ background:var(--orange); }
.bar-val { position:absolute; right:8px; top:50%; transform:translateY(-50%);
  font-size:11px; font-weight:700; color:var(--text); white-space:nowrap; }
.dash-empty { text-align:center; padding:24px; color:var(--dim); font-size:13px; }
.dash-toggle { display:flex; gap:6px; margin-bottom:12px; }
.btn-toggle {
  padding:4px 10px; border:1px solid var(--border); border-radius:6px;
  font-size:11px; font-weight:600; cursor:pointer; background:var(--bg); color:var(--dim);
}
.btn-toggle.active { background:var(--text); color:#fff; border-color:var(--text); }

/* ── Protokoll-Filter ── */
.proto-filter {
  background:var(--surface); border-radius:12px; box-shadow:var(--shadow);
  padding:14px 18px; margin-bottom:20px;
  display:flex; align-items:center; gap:12px; flex-wrap:wrap;
}
.proto-filter.hidden { display:none; }
.proto-filter label { font-size:12px; font-weight:600; color:var(--dim); white-space:nowrap; }
.proto-filter .form-input { width:auto; padding:7px 10px; font-size:13px; }
.proto-filter select.form-input { min-width:120px; }
.badge-qual {
  display:inline-block; padding:1px 7px; border-radius:99px;
  font-size:11px; font-weight:700; font-family:monospace;
  background:var(--bg); color:var(--dim);
}
.badge-qual-A { background:#dcfce7; color:#15803d; }
.badge-qual-B { background:#fef9c3; color:#a16207; }
.badge-qual-C { background:#fee2e2; color:#dc2626; }
.proto-del-btn { color:var(--red) !important; border-color:transparent; }
.proto-del-btn:hover { background:#fee2e2 !important; border-color:var(--red) !important; }
</style>
</head>
<body>

<!-- ── Login ── -->
<div id="loginPage">
  <div class="login-card">
    <div class="login-logo"><img src="logo.png" alt="Harvio"></div>
    <div class="login-title">Harvio Admin</div>
    <div class="login-sub">Betriebsleiter-Bereich</div>
    <div class="form-group">
      <label class="form-label">Benutzername</label>
      <input class="form-input" id="loginUser" type="text" placeholder="name"
        autocomplete="off" autocorrect="off" autocapitalize="off"
        onkeydown="if(event.key==='Enter')login()">
    </div>
    <div class="form-group">
      <label class="form-label">Passwort</label>
      <input class="form-input" id="loginPass" type="password"
        onkeydown="if(event.key==='Enter')login()">
    </div>
    <button class="btn-primary" id="loginBtn" onclick="login()">Anmelden</button>
    <div class="login-error" id="loginErr"></div>
  </div>
</div>

<!-- ── App ── -->
<div id="appPage">
  <div class="app-layout">
    <aside>
      <div class="sidebar-logo"><img src="logo.png" alt="Harvio">Harvio</div>
      <nav class="sidebar-nav">
        <div class="nav-item active" id="nav-mitarbeiter" onclick="navigate('mitarbeiter')"
          data-tip="Pflücker verwalten · QR-Etiketten drucken">
          <span class="icon">👥</span> Mitarbeiter
        </div>
        <div class="nav-item" id="nav-betriebsleiter" onclick="navigate('betriebsleiter')"
          data-tip="Zugänge für weitere Betriebsleiter anlegen">
          <span class="icon">🔑</span> Betriebsleiter
        </div>
        <div class="nav-item" id="nav-felder" onclick="navigate('felder')"
          data-tip="Ernte­felder und deren Fruchtart pflegen">
          <span class="icon">🗺️</span> Felder
        </div>
        <div class="nav-item" id="nav-fruchtarten" onclick="navigate('fruchtarten')"
          data-tip="Obst­arten (z.B. Erdbeere, Himbeere)">
          <span class="icon">🌱</span> Fruchtarten
        </div>
        <div class="nav-item" id="nav-sorten" onclick="navigate('sorten')"
          data-tip="Sorten je Fruchtart (z.B. Elsanta, Senga)">
          <span class="icon">🍓</span> Sorten
        </div>
        <div class="nav-item" id="nav-qualitaeten" onclick="navigate('qualitaeten')"
          data-tip="Qualitäts­stufen für die Ernte­erfassung">
          <span class="icon">⭐</span> Qualitäten
        </div>
        <div class="nav-item" id="nav-gebinde" onclick="navigate('gebinde')"
          data-tip="Körbe / Behälter mit Gewicht oder Manuell-Eingabe">
          <span class="icon">📦</span> Gebinde
        </div>
        <div class="nav-item" id="nav-protokoll" onclick="navigate('protokoll')"
          data-tip="Ernteeinträge ansehen, bearbeiten und löschen">
          <span class="icon">📋</span> Protokoll
        </div>
        <div class="nav-item" id="nav-auswertung" onclick="navigate('auswertung')"
          data-tip="Ernte-Auswertungen · Kilo und Gebinde je Feld, Tag, Pflücker …">
          <span class="icon">📊</span> Auswertung
        </div>
      </nav>
      <div class="sidebar-user">
        <div style="font-size:11px;color:var(--sidebar-dim);margin-bottom:2px" id="sidebarBetrieb"></div>
        <div class="sidebar-username" id="sidebarUser">–</div>
        <div id="sidebarRole" style="font-size:11px;color:var(--sidebar-dim);margin-bottom:8px"></div>
        <div style="display:flex;gap:6px;flex-wrap:wrap">
          <button class="btn-logout" onclick="openChangePassword()" style="flex:1" data-tip="Eigenes Passwort ändern">🔒 Passwort</button>
          <button class="btn-logout" onclick="logout()">Abmelden</button>
        </div>
      </div>
    </aside>

    <main>
      <div class="page-header">
        <div class="page-title" id="pageTitle">Mitarbeiter</div>
        <button class="btn-add" id="addBtn" onclick="openAdd()" data-tip="Neuen Eintrag anlegen">+ Neu anlegen</button>
      </div>
      <!-- Protokoll-Filter (nur bei Protokoll sichtbar) -->
      <div class="proto-filter hidden" id="protokollFilter">
        <label>Von</label>
        <input class="form-input" id="proto_von" type="date" onchange="loadProtokoll()">
        <label>Bis</label>
        <input class="form-input" id="proto_bis" type="date" onchange="loadProtokoll()">
        <label>Feld</label>
        <select class="form-input" id="proto_feld" onchange="loadProtokoll()">
          <option value="">Alle</option>
        </select>
        <label>Pflücker</label>
        <select class="form-input" id="proto_pfluecker" onchange="loadProtokoll()">
          <option value="">Alle</option>
        </select>
        <div class="dash-quick">
          <button class="btn-quick" onclick="setProtoRange('today')">Heute</button>
          <button class="btn-quick active" onclick="setProtoRange('week')">Diese Woche</button>
          <button class="btn-quick" onclick="setProtoRange('month')">Dieser Monat</button>
          <button class="btn-quick" onclick="setProtoRange('all')">Gesamt</button>
        </div>
      </div>

      <!-- Dashboard-Filter (nur bei Auswertung sichtbar) -->
      <div class="dash-filter hidden" id="dashFilter">
        <label>Von</label>
        <input class="form-input" id="dash_von" type="date" onchange="loadAuswertung()">
        <label>Bis</label>
        <input class="form-input" id="dash_bis" type="date" onchange="loadAuswertung()">
        <div class="dash-quick">
          <button class="btn-quick" onclick="setDashRange('today')">Heute</button>
          <button class="btn-quick" onclick="setDashRange('week')">Diese Woche</button>
          <button class="btn-quick" onclick="setDashRange('month')">Dieser Monat</button>
          <button class="btn-quick active" id="dash_q_all" onclick="setDashRange('all')">Gesamt</button>
        </div>
      </div>

      <div class="table-card" id="tableCard">
        <div id="tableContainer"></div>
      </div>
    </main>
  </div>
</div>

<!-- ── Edit/Add Modal ── -->
<div class="overlay hidden" id="modalOverlay" onclick="if(event.target===this)closeModal()">
  <div class="modal-card">
    <div class="modal-title" id="modalTitle">Eintrag bearbeiten</div>
    <div id="modalForm"></div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal()">Abbrechen</button>
      <button class="btn-save" onclick="saveModal()">Speichern</button>
    </div>
  </div>
</div>

<!-- ── QR Print Modal ── -->
<div class="overlay hidden" id="qrOverlay" onclick="if(event.target===this)closeQR()">
  <div class="qr-modal-card">
    <div class="modal-title">🏷️ Etiketten drucken</div>
    <div id="qrEmployeeName" style="font-size:14px;font-weight:600;margin-bottom:16px;color:var(--primary)"></div>
    <div class="qr-settings">
      <div>
        <label data-tip="Wie viele Aufkleber sollen gedruckt werden? (max. 200)">Anzahl Etiketten ℹ️</label>
        <input class="form-input" id="qrCount" type="number" value="10" min="1" max="200"
          oninput="updateQRPreview()">
      </div>
      <div>
        <label data-tip="Wird automatisch als nächste freie Nummer ermittelt – nicht änderbar">Startnummer 🔒</label>
        <input class="form-input" id="qrStart" type="number" value="1" min="1" readonly
          style="background:#f8fafc;color:var(--dim);cursor:default">
      </div>
    </div>
    <div style="font-size:12px;color:var(--dim);margin-bottom:8px"
      data-tip="Jedes Etikett enthält einen QR-Code der Form MA-Nr/lfd.Nr – beim Scannen in der App wird Doppelerfassung erkannt">
      Vorschau (erste 3) ℹ️:</div>
    <div class="qr-preview" id="qrPreview"></div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeQR()">Abbrechen</button>
      <button class="btn-save" onclick="printLabels()">🖨️ Drucken</button>
    </div>
  </div>
</div>

<script>
// ── CONFIG ──────────────────────────────────────────────────
const SB_URL    = 'https://xbfhsnsyisvehmonyrxh.supabase.co';
const SB_KEY    = 'sb_publishable_VMr7U2_1nwBJg8D3Z5MW2g_Ki81tU1I';
const SB_DOMAIN = '@kastanienhof.local';

// ── STATE ────────────────────────────────────────────────────
let session = null;
let currentSection = 'mitarbeiter';
let editId = null;
let qrEmployee = null;
let currentUserRole = null;
let currentUserId = null;

const cache = { mitarbeiter:[], betriebsleiter:[], felder:[], fruchtarten:[], sorten:[], qualitaeten:[], gebinde:[] };

const SECTION_CONFIG = {
  mitarbeiter:     { table:'pfluecker',          label:'Mitarbeiter',   order:'mitarbeiter_nr' },
  betriebsleiter:  { table:'betrieb_mitglieder', label:'Betriebsleiter', order:'username', special:true },
  felder:          { table:'felder',             label:'Felder',        order:'name' },
  fruchtarten:  { table:'fruchtarten',  label:'Fruchtarten',  order:'sort_order' },
  sorten:       { table:'sorten',       label:'Sorten',       order:'name' },
  qualitaeten:  { table:'qualitaeten',  label:'Qualitäten',   order:'sort_order' },
  gebinde:      { table:'gebinde',      label:'Gebinde',      order:'sort_order' },
  protokoll:    { table:'ernteeintraege', label:'Protokoll',  order:'datum', special:true },
  auswertung:   { table:'ernteeintraege', label:'Auswertung', order:'datum', special:true }
};

// ── SUPABASE HELPERS ─────────────────────────────────────────
function sbHeaders() {
  const token = session?.access_token || SB_KEY;
  return { 'apikey': SB_KEY, 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' };
}
async function sbGet(table, qs='') {
  const r = await fetch(`${SB_URL}/rest/v1/${table}?${qs}`, { headers: sbHeaders() });
  if (!r.ok) throw new Error(`HTTP ${r.status}`);
  return r.json();
}
async function sbPost(table, data) {
  const r = await fetch(`${SB_URL}/rest/v1/${table}`, {
    method:'POST', headers:{ ...sbHeaders(), 'Prefer':'return=representation' },
    body: JSON.stringify(data)
  });
  if (!r.ok) throw new Error(await r.text());
  return r.json();
}
async function sbPatch(table, id, data) {
  const r = await fetch(`${SB_URL}/rest/v1/${table}?id=eq.${id}`, {
    method:'PATCH', headers:{ ...sbHeaders(), 'Prefer':'return=minimal' },
    body: JSON.stringify(data)
  });
  if (!r.ok) throw new Error(await r.text());
}
async function sbDelete(table, id) {
  const r = await fetch(`${SB_URL}/rest/v1/${table}?id=eq.${id}`, {
    method:'DELETE', headers: sbHeaders()
  });
  if (!r.ok) throw new Error(await r.text());
}

// ── AUTH ─────────────────────────────────────────────────────
function authDomain() {
  return SB_DOMAIN.startsWith('@') ? SB_DOMAIN : '@' + SB_DOMAIN;
}
async function login() {
  const username = document.getElementById('loginUser').value.trim().toLowerCase();
  const password = document.getElementById('loginPass').value;
  const errEl    = document.getElementById('loginErr');
  const btn      = document.getElementById('loginBtn');
  errEl.textContent = '';
  if (!username || !password) { errEl.textContent = 'Alle Felder ausfüllen.'; return; }
  btn.textContent = 'Anmelden…'; btn.disabled = true;
  try {
    const res = await fetch(`${SB_URL}/auth/v1/token?grant_type=password`, {
      method: 'POST',
      headers: { 'apikey': SB_KEY, 'Content-Type': 'application/json' },
      body: JSON.stringify({ email: username + authDomain(), password })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error_description || data.msg || 'Anmeldung fehlgeschlagen');
    session = data;
    localStorage.setItem('admin_session', JSON.stringify({ access_token: data.access_token, refresh_token: data.refresh_token, username }));
    showApp(username);
  } catch(e) {
    errEl.textContent = e.message;
  } finally {
    btn.textContent = 'Anmelden'; btn.disabled = false;
  }
}
async function logout() {
  if (!confirm('Abmelden?')) return;
  try { await fetch(`${SB_URL}/auth/v1/logout`, { method:'POST', headers:sbHeaders() }); } catch {}
  session = null;
  currentUserRole = null;
  currentUserId = null;
  localStorage.removeItem('admin_session');
  document.getElementById('appPage').style.display  = 'none';
  document.getElementById('loginPage').style.display = 'flex';
}
async function checkAuth() {
  const saved = JSON.parse(localStorage.getItem('admin_session') || 'null');
  if (!saved?.access_token) return;
  try {
    const res = await fetch(`${SB_URL}/auth/v1/token?grant_type=refresh_token`, {
      method:'POST', headers:{ 'apikey':SB_KEY, 'Content-Type':'application/json' },
      body: JSON.stringify({ refresh_token: saved.refresh_token })
    });
    if (!res.ok) throw new Error();
    const data = await res.json();
    session = data;
    localStorage.setItem('admin_session', JSON.stringify({ ...saved, access_token: data.access_token, refresh_token: data.refresh_token }));
    showApp(saved.username);
  } catch { localStorage.removeItem('admin_session'); }
}
async function showApp(username) {
  document.getElementById('loginPage').style.display = 'none';
  document.getElementById('appPage').style.display   = 'block';
  document.getElementById('sidebarUser').textContent = username;
  // Rolle des aktuellen Nutzers laden
  try {
    const me = await sbGet('betrieb_mitglieder', `username=eq.${encodeURIComponent(username)}&select=rolle,user_id`);
    if (me.length) { currentUserRole = me[0].rolle; currentUserId = me[0].user_id; }
  } catch {}
  const roleEl = document.getElementById('sidebarRole');
  if (roleEl) roleEl.textContent = currentUserRole === 'admin' ? '★ Admin' : '● Betriebsleiter';
  // Betriebsname laden und anzeigen
  try {
    const rows = await sbGet('betriebe', 'select=name&limit=1');
    document.getElementById('sidebarBetrieb').textContent =
      rows.length ? '🏡 ' + rows[0].name : '';
  } catch { /* betriebe noch nicht eingerichtet */ }
  navigate('mitarbeiter');
}

// ── NAVIGATION ───────────────────────────────────────────────
async function navigate(section) {
  currentSection = section;
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  document.getElementById('nav-' + section).classList.add('active');
  const cfg = SECTION_CONFIG[section];
  document.getElementById('pageTitle').innerHTML =
    cfg.label + `<small id="rowCount"></small>`;
  document.getElementById('tableContainer').innerHTML =
    '<table><thead><tr><th colspan="10" style="text-align:center;padding:24px;color:var(--dim)">Lade…</th></tr></thead></table>';
  const addBtn        = document.getElementById('addBtn');
  const dashFilter    = document.getElementById('dashFilter');
  const protoFilter   = document.getElementById('protokollFilter');
  const tableCard     = document.getElementById('tableCard');
  // Filter-Leisten
  dashFilter.classList.add('hidden');
  protoFilter.classList.add('hidden');
  tableCard.classList.remove('dash-mode');
  if (section === 'auswertung') {
    addBtn.style.display = 'none';
    dashFilter.classList.remove('hidden');
    tableCard.classList.add('dash-mode');
  } else if (section === 'protokoll') {
    addBtn.style.display = 'none';
    protoFilter.classList.remove('hidden');
  } else {
    // Nur Admin darf neue Betriebsleiter anlegen
    addBtn.style.display = (section === 'betriebsleiter' && currentUserRole !== 'admin') ? 'none' : '';
  }
  await loadSection(section);
}

async function loadSection(section) {
  if (section === 'auswertung') { await loadAuswertung(); return; }
  if (section === 'protokoll')  { await initProtokoll();  return; }
  if (section === 'betriebsleiter') {
    cache.betriebsleiter = await sbGet('betrieb_mitglieder', 'order=username&select=betrieb_id,user_id,rolle,username');
    renderSection(section);
    return;
  }
  // Fruchtarten immer vorladen (für Dropdowns)
  if (!cache.fruchtarten.length || section === 'fruchtarten') {
    cache.fruchtarten = await sbGet('fruchtarten', 'order=sort_order');
  }
  const cfg = SECTION_CONFIG[section];
  cache[section] = await sbGet(cfg.table, `order=${cfg.order}`);
  renderSection(section);
}

// ── RENDER ───────────────────────────────────────────────────
function renderSection(section) {
  const data = cache[section];
  const el = document.getElementById('tableContainer');
  const countEl = document.getElementById('rowCount');
  if (countEl) countEl.textContent = ` · ${data.length} Einträge`;

  const renders = {
    mitarbeiter: renderMitarbeiter,
    betriebsleiter: renderBetriebsleiter,
    felder: renderFelder,
    fruchtarten: renderFruchtarten,
    sorten: renderSorten,
    qualitaeten: renderQualitaeten,
    gebinde: renderGebinde
  };
  el.innerHTML = renders[section](data);
}

function emptyRow(msg='Noch keine Einträge') {
  return `<tr class="empty-row"><td colspan="10">${msg}</td></tr>`;
}
function statusBadge(aktiv) {
  return aktiv
    ? '<span class="badge badge-green" data-tip="Wird in der App angezeigt">● aktiv</span>'
    : '<span class="badge badge-red" data-tip="Wird in der App ausgeblendet">○ inaktiv</span>';
}
function fruchtartName(id) {
  const f = cache.fruchtarten.find(x => x.id === id);
  return f ? `${f.emoji} ${f.name}` : '–';
}
function nrBadge(nr) {
  return `<span class="badge-nr" data-tip="Eindeutige Mitarbeiter-Nr. · automatisch vergeben">MA-${String(nr).padStart(5,'0')}</span>`;
}

function renderMitarbeiter(data) {
  return `<table>
    <thead><tr>
      <th>Nr.</th><th>Name</th><th>Telefon</th><th>Eintrittsdatum</th><th>Status</th><th>Aktionen</th>
    </tr></thead>
    <tbody>${data.length ? data.map(r => `
      <tr>
        <td>${nrBadge(r.mitarbeiter_nr)}</td>
        <td style="font-weight:600">${esc(r.name)}</td>
        <td>${r.telefon ? esc(r.telefon) : '<span style="color:var(--dim)">–</span>'}</td>
        <td>${r.eintrittsdatum ? new Date(r.eintrittsdatum).toLocaleDateString('de-DE') : '<span style="color:var(--dim)">–</span>'}</td>
        <td>${statusBadge(r.aktiv)}</td>
        <td><div class="actions">
          <button class="btn-icon qr" onclick="openQR(${r.id})" data-tip="QR-Etiketten drucken">🏷️</button>
          <button class="btn-icon"    onclick="openEdit(${r.id})" data-tip="Bearbeiten">✏️</button>
          <button class="btn-icon del" onclick="del(${r.id})" data-tip="Mitarbeiter löschen">🗑</button>
        </div></td>
      </tr>`).join('') : emptyRow()}</tbody>
  </table>`;
}

function renderBetriebsleiter(data) {
  const isAdmin = currentUserRole === 'admin';
  const rows = data.length ? data.map(r => {
    const isAdminRow = r.rolle === 'admin';
    const roleBadge = isAdminRow
      ? '<span class="badge badge-blue">★ Admin</span>'
      : '<span class="badge badge-green">● Betriebsleiter</span>';
    const delBtn = (isAdmin && !isAdminRow)
      ? `<button class="btn-icon del" onclick="delBetriebsleiter('${r.user_id}')" data-tip="Betriebsleiter-Zugang entfernen">🗑</button>`
      : '';
    return `<tr>
        <td style="font-weight:600">${esc(r.username || '–')}</td>
        <td>${roleBadge}</td>
        <td><div class="actions">${delBtn}</div></td>
      </tr>`;
  }).join('') : emptyRow('Noch keine weiteren Betriebsleiter');
  return `<table>
    <thead><tr>
      <th>Benutzername</th><th>Rolle</th><th>Aktionen</th>
    </tr></thead>
    <tbody>${rows}</tbody>
  </table>`;
}

function renderFelder(data) {
  return `<table>
    <thead><tr>
      <th>Name</th><th>Fruchtart</th><th>Status</th><th>Aktionen</th>
    </tr></thead>
    <tbody>${data.length ? data.map(r => `
      <tr>
        <td style="font-weight:600">${esc(r.name)}</td>
        <td>${fruchtartName(r.fruchtart_id)}</td>
        <td>${statusBadge(r.aktiv)}</td>
        <td><div class="actions">
          <button class="btn-icon"     onclick="openEdit(${r.id})" data-tip="Bearbeiten">✏️</button>
          <button class="btn-icon del" onclick="del(${r.id})" data-tip="Feld löschen">🗑</button>
        </div></td>
      </tr>`).join('') : emptyRow()}</tbody>
  </table>`;
}

function renderFruchtarten(data) {
  return `<table>
    <thead><tr>
      <th>Emoji</th><th>Name</th><th>Farbe</th><th>Reihenfolge</th><th>Status</th><th>Aktionen</th>
    </tr></thead>
    <tbody>${data.length ? data.map(r => `
      <tr>
        <td style="font-size:20px">${r.emoji}</td>
        <td style="font-weight:600">${esc(r.name)}</td>
        <td><span class="color-dot" style="background:${r.farbe}"></span> <span style="font-family:monospace;font-size:13px">${r.farbe}</span></td>
        <td>${r.sort_order}</td>
        <td>${statusBadge(r.aktiv)}</td>
        <td><div class="actions">
          <button class="btn-icon"     onclick="openEdit(${r.id})" data-tip="Bearbeiten">✏️</button>
          <button class="btn-icon del" onclick="del(${r.id})" data-tip="Fruchtart löschen">🗑</button>
        </div></td>
      </tr>`).join('') : emptyRow()}</tbody>
  </table>`;
}

function renderSorten(data) {
  return `<table>
    <thead><tr>
      <th>Name</th><th>Fruchtart</th><th>Status</th><th>Aktionen</th>
    </tr></thead>
    <tbody>${data.length ? data.map(r => `
      <tr>
        <td style="font-weight:600">${esc(r.name)}</td>
        <td>${fruchtartName(r.fruchtart_id)}</td>
        <td>${statusBadge(r.aktiv)}</td>
        <td><div class="actions">
          <button class="btn-icon"     onclick="openEdit(${r.id})" data-tip="Bearbeiten">✏️</button>
          <button class="btn-icon del" onclick="del(${r.id})" data-tip="Sorte löschen">🗑</button>
        </div></td>
      </tr>`).join('') : emptyRow()}</tbody>
  </table>`;
}

function renderQualitaeten(data) {
  return `<table>
    <thead><tr>
      <th>Code</th><th>Bezeichnung</th><th>Emoji</th><th>Reihenfolge</th><th>Status</th><th>Aktionen</th>
    </tr></thead>
    <tbody>${data.length ? data.map(r => `
      <tr>
        <td><span class="badge-nr" data-tip="Kurzcode für die App-Auswahl">${esc(r.code)}</span></td>
        <td style="font-weight:600">${esc(r.label)}</td>
        <td style="font-size:18px">${r.emoji}</td>
        <td>${r.sort_order}</td>
        <td>${statusBadge(r.aktiv)}</td>
        <td><div class="actions">
          <button class="btn-icon"     onclick="openEdit(${r.id})" data-tip="Bearbeiten">✏️</button>
          <button class="btn-icon del" onclick="del(${r.id})" data-tip="Qualität löschen">🗑</button>
        </div></td>
      </tr>`).join('') : emptyRow()}</tbody>
  </table>`;
}

function renderGebinde(data) {
  return `<table>
    <thead><tr>
      <th>Bezeichnung</th><th>Gewicht</th><th>Reihenfolge</th><th>Status</th><th>Aktionen</th>
    </tr></thead>
    <tbody>${data.length ? data.map(r => `
      <tr>
        <td style="font-weight:600">${esc(r.label)}</td>
        <td>${r.gewicht_kg != null ? r.gewicht_kg + ' kg' : '<span style="color:var(--dim)" data-tip="Gewicht wird manuell am Gerät eingegeben">Manuell</span>'}</td>
        <td>${r.sort_order}</td>
        <td>${statusBadge(r.aktiv)}</td>
        <td><div class="actions">
          <button class="btn-icon"     onclick="openEdit(${r.id})" data-tip="Bearbeiten">✏️</button>
          <button class="btn-icon del" onclick="del(${r.id})" data-tip="Gebinde löschen">🗑</button>
        </div></td>
      </tr>`).join('') : emptyRow()}</tbody>
  </table>`;
}

// ── MODAL: ADD / EDIT ─────────────────────────────────────────
function fruchtartOptions(selectedId) {
  return cache.fruchtarten.map(f =>
    `<option value="${f.id}" ${f.id === selectedId ? 'selected' : ''}>${f.emoji} ${esc(f.name)}</option>`
  ).join('');
}

function getFormHTML(section, r) {
  const v = r || {};
  const aktiv = r ? r.aktiv : true;
  const fa = `<div class="full"><label class="form-label">Fruchtart</label>
    <select class="form-input" id="f_fruchtart_id">
      <option value="">– bitte wählen –</option>${fruchtartOptions(v.fruchtart_id)}
    </select></div>`;
  const statusField = `<div class="full"><label class="form-check">
    <input type="checkbox" id="f_aktiv" ${aktiv ? 'checked' : ''}> Aktiv
  </label></div>`;

  switch(section) {
    case 'betriebsleiter': return `<div class="modal-grid">
      <div class="full"><label class="form-label">Benutzername *</label>
        <div style="display:flex;align-items:center;gap:4px">
          <input class="form-input" id="f_username" placeholder="z.B. maria" style="flex:1"
            autocomplete="off" autocorrect="off" autocapitalize="off">
          <span style="font-size:13px;color:var(--dim);white-space:nowrap">${SB_DOMAIN}</span>
        </div></div>
      <div class="full"><label class="form-label">Passwort *</label>
        <input class="form-input" id="f_password" type="password" placeholder="Mindestens 6 Zeichen"
          autocomplete="new-password"></div>
      <div class="full"><div class="modal-nr-hint" style="padding:8px;background:#f0fdf4;border-radius:6px;color:var(--green)">
        ✓ Der neue Betriebsleiter kann alle Daten verwalten, aber keine weiteren Konten anlegen oder löschen.
      </div></div>
    </div>`;

    case 'mitarbeiter': return `<div class="modal-grid">
      ${r?.mitarbeiter_nr != null ? `<div class="full">
        <label class="form-label">Mitarbeiter-Nr.</label>
        <div class="badge-nr" style="display:inline-block">MA-${String(r.mitarbeiter_nr).padStart(5,'0')}</div>
        <div class="modal-nr-hint">Wird automatisch vergeben und kann nicht geändert werden.</div>
      </div>` : `<div class="full"><div class="modal-nr-hint" style="padding:8px;background:#f0fdf4;border-radius:6px;color:var(--green)">
        ✓ Mitarbeiter-Nr. wird automatisch vergeben.
      </div></div>`}
      <div class="full"><label class="form-label">Name *</label>
        <input class="form-input" id="f_name" value="${esc(v.name||'')}"></div>
      <div><label class="form-label">Telefon</label>
        <input class="form-input" id="f_telefon" value="${esc(v.telefon||'')}"></div>
      <div><label class="form-label">Eintrittsdatum</label>
        <input class="form-input" id="f_eintrittsdatum" type="date" value="${v.eintrittsdatum||''}"></div>
      ${statusField}
    </div>`;

    case 'felder': return `<div class="modal-grid">

      <div><label class="form-label">Name *</label>
        <input class="form-input" id="f_name" value="${esc(v.name||'')}"></div>
      <div><label class="form-label">Emoji</label>

          <input type="color" id="f_farbe_picker" value="${v.farbe||'#e8244a'}"
            style="width:38px;height:38px;border:1px solid var(--border);border-radius:6px;cursor:pointer"
            oninput="document.getElementById('f_farbe').value=this.value">
        </div></div>
      <div><label class="form-label">Reihenfolge</label>
        <input class="form-input" id="f_sort_order" type="number" value="${v.sort_order||0}"></div>
      ${statusField}
    </div>`;

    case 'sorten': return `<div class="modal-grid">
      <div class="full"><label class="form-label">Name *</label>
        <input class="form-input" id="f_name" value="${esc(v.name||'')}"></div>
      ${fa}${statusField}
    </div>`;

    case 'qualitaeten': return `<div class="modal-grid">
      <div><label class="form-label">Code *</label>
        <input class="form-input" id="f_code" value="${esc(v.code||'')}" maxlength="5"></div>
      <div><label class="form-label">Emoji</label>
        <input class="form-input" id="f_emoji" value="${esc(v.emoji||'⚪')}"></div>
      <div class="full"><label class="form-label">Bezeichnung *</label>
        <input class="form-input" id="f_label" value="${esc(v.label||'')}"></div>
      <div><label class="form-label">Reihenfolge</label>
        <input class="form-input" id="f_sort_order" type="number" value="${v.sort_order||0}"></div>
      ${statusField}
    </div>`;

    case 'gebinde': return `<div class="modal-grid">
      <div class="full"><label class="form-label">Bezeichnung *</label>
        <input class="form-input" id="f_label" value="${esc(v.label||'')}"></div>

      <div><label class="form-label">Reihenfolge</label>

function openAdd() {
  editId = null;
  const label = currentSection === 'betriebsleiter' ? 'Neuen Betriebsleiter anlegen' :
    SECTION_CONFIG[currentSection].label + ' anlegen';
  document.getElementById('modalTitle').textContent = label;
  document.getElementById('modalForm').innerHTML = getFormHTML(currentSection, null);
  document.getElementById('modalOverlay').classList.remove('hidden');
  document.querySelector('#modalForm input:not([type=checkbox]):not([type=color])')?.focus();
}

function openEdit(id) {
  editId = id;
  const record = cache[currentSection].find(r => r.id === id);
  if (!record) return;
  document.getElementById('modalTitle').textContent = SECTION_CONFIG[currentSection].label + ' bearbeiten';
  document.getElementById('modalForm').innerHTML = getFormHTML(currentSection, record);
  document.getElementById('modalOverlay').classList.remove('hidden');
}

function closeModal() {
  document.getElementById('modalOverlay').classList.add('hidden');
  editId = null;
}

function getFieldVal(id, fallback=null) {
  const el = document.getElementById(id);
  if (!el) return fallback;
  if (el.type === 'checkbox') return el.checked;
  return el.value.trim() || fallback;
}

function buildRecord(section) {
  switch(section) {
    case 'mitarbeiter': return {
      name:           getFieldVal('f_name'),
      telefon:        getFieldVal('f_telefon'),
      eintrittsdatum: getFieldVal('f_eintrittsdatum'),
      aktiv:          getFieldVal('f_aktiv', true)
    };
    case 'felder': return {
      name:         getFieldVal('f_name'),
      fruchtart_id: getFieldVal('f_fruchtart_id') ? parseInt(getFieldVal('f_fruchtart_id')) : null,
      aktiv:        getFieldVal('f_aktiv', true)
    };
    case 'fruchtarten': return {
      name:       getFieldVal('f_name'),
      emoji:      getFieldVal('f_emoji', '🍓'),
      farbe:      getFieldVal('f_farbe', '#e8244a'),
      sort_order: parseInt(getFieldVal('f_sort_order', '0')),
      aktiv:      getFieldVal('f_aktiv', true)
    };
    case 'sorten': return {
      name:         getFieldVal('f_name'),
      fruchtart_id: getFieldVal('f_fruchtart_id') ? parseInt(getFieldVal('f_fruchtart_id')) : null,
      aktiv:        getFieldVal('f_aktiv', true)
    };
    case 'qualitaeten': return {
      code:       getFieldVal('f_code'),
      label:      getFieldVal('f_label'),
      emoji:      getFieldVal('f_emoji', '⚪'),
      sort_order: parseInt(getFieldVal('f_sort_order', '0')),
      aktiv:      getFieldVal('f_aktiv', true)
    };
    case 'gebinde': {
      const kg = getFieldVal('f_gewicht_kg');
      return {
        label:      getFieldVal('f_label'),
        gewicht_kg: kg !== null ? parseFloat(kg) : null,
        sort_order: parseInt(getFieldVal('f_sort_order', '0')),
        aktiv:      getFieldVal('f_aktiv', true)
      };
    }
  }
}

async function saveModal() {
  if (currentSection === 'betriebsleiter') {
    await saveBetriebsleiter(); return;
  }
  const data = buildRecord(currentSection);
  if (!data.name && !data.label && !data.code) {
    alert('Pflichtfelder ausfüllen.'); return;
  }
  const cfg = SECTION_CONFIG[currentSection];
  try {
    if (editId) {
      await sbPatch(cfg.table, editId, data);
    } else {
      await sbPost(cfg.table, data);
    }
    closeModal();
    await loadSection(currentSection);
  } catch(e) {
    alert('Fehler: ' + e.message);
  }
}

async function saveBetriebsleiter() {
  const username = (getFieldVal('f_username') || '').toLowerCase();
  const password = getFieldVal('f_password');
  if (!username || !password) { alert('Benutzername und Passwort ausfüllen.'); return; }
  if (password.length < 6) { alert('Passwort mindestens 6 Zeichen.'); return; }
  try {
    // 1. Auth-User anlegen
    const res = await fetch(`${SB_URL}/auth/v1/signup`, {
      method: 'POST',
      headers: { 'apikey': SB_KEY, 'Content-Type': 'application/json' },
      body: JSON.stringify({ email: username + authDomain(), password })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error_description || data.msg || 'Anlegen fehlgeschlagen');
    const userId = data.user?.id || data.id;
    if (!userId) throw new Error('Keine User-ID erhalten');
    // 2. Betrieb-ID holen und User zuordnen
    const betriebe = await sbGet('betriebe', 'select=id&limit=1');
    if (!betriebe.length) throw new Error('Kein Betrieb gefunden');
    await fetch(`${SB_URL}/rest/v1/betrieb_mitglieder`, {
      method: 'POST',
      headers: { ...sbHeaders(), 'Prefer': 'return=minimal' },
      body: JSON.stringify({ betrieb_id: betriebe[0].id, user_id: userId, username, rolle: 'betriebsleiter' })
    });
    closeModal();
    await loadSection('betriebsleiter');
  } catch(e) {
    alert('Fehler: ' + e.message);
  }
}

async function delBetriebsleiter(userId) {
  if (!confirm('Betriebsleiter wirklich entfernen?')) return;
  try {
    const r = await fetch(`${SB_URL}/rest/v1/betrieb_mitglieder?user_id=eq.${userId}`, {
      method: 'DELETE', headers: sbHeaders()
    });
    if (!r.ok) throw new Error(await r.text());
    await loadSection('betriebsleiter');
  } catch(e) {
    alert('Fehler: ' + e.message);
  }
}

async function del(id) {
  if (!confirm('Eintrag wirklich löschen?')) return;
  const cfg = SECTION_CONFIG[currentSection];
  try {
    await sbDelete(cfg.table, id);
    await loadSection(currentSection);
  } catch(e) {
    alert('Fehler: ' + e.message);
  }
}

// ── QR PRINT ─────────────────────────────────────────────────
async function openQR(id) {
  qrEmployee = cache.mitarbeiter.find(r => r.id === id);
  if (!qrEmployee) return;
  document.getElementById('qrEmployeeName').textContent =
    `${qrEmployee.name} · MA-${String(qrEmployee.mitarbeiter_nr).padStart(5,'0')}`;
  document.getElementById('qrCount').value = 10;
  document.getElementById('qrStart').value = '…';
  document.getElementById('qrOverlay').classList.remove('hidden');
  // Nächste lfd_nr automatisch ermitteln
  try {
    const rows = await sbGet('etiketten',
      `pfluecker_nr=eq.${qrEmployee.mitarbeiter_nr}&order=lfd_nr.desc&limit=1&select=lfd_nr`);
    document.getElementById('qrStart').value = rows.length ? rows[0].lfd_nr + 1 : 1;
  } catch {
    document.getElementById('qrStart').value = 1;
  }
  updateQRPreview();
}

function closeQR() {
  document.getElementById('qrOverlay').classList.add('hidden');
  qrEmployee = null;
}

function qrContent(nr, lfd) { return `${String(nr).padStart(5,'0')}/${String(lfd).padStart(5,'0')}`; }
function fmtNr(n, pad=5) { return String(n).padStart(pad, '0'); }

function buildLabelHTML(emp, lfdNr) {
  const nr  = emp.mitarbeiter_nr;
  const qr  = qrContent(nr, lfdNr);
  return { qr, name: emp.name, ma: `MA-${fmtNr(nr)}`, lfd: `#${fmtNr(lfdNr)}` };
}

function updateQRPreview() {
  if (!qrEmployee) return;
  const count = Math.min(parseInt(document.getElementById('qrCount').value) || 1, 200);
  const start = parseInt(document.getElementById('qrStart').value) || 1;
  const preview = document.getElementById('qrPreview');
  preview.innerHTML = '';
  const shown = Math.min(count, 3);
  for (let i = 0; i < shown; i++) {
    const { qr, name, ma, lfd } = buildLabelHTML(qrEmployee, start + i);
    const card = document.createElement('div');
    card.className = 'qr-preview-label';
    const qrDiv = document.createElement('div');
    card.appendChild(qrDiv);
    const info = document.createElement('div');
    info.className = 'qr-preview-info';
    info.innerHTML = `<div class="name">${esc(name)}</div><div class="nr">${ma} · ${lfd}</div>`;
    card.appendChild(info);
    preview.appendChild(card);
    new QRCode(qrDiv, { text: qr, width: 56, height: 56, correctLevel: QRCode.CorrectLevel.M });
  }
  if (count > 3) {
    const more = document.createElement('div');
    more.style.cssText = 'font-size:13px;color:var(--dim);padding:8px;align-self:center';
    more.textContent = `+ ${count - 3} weitere Etiketten…`;
    preview.appendChild(more);
  }
}

async function printLabels() {
  if (!qrEmployee) return;
  const count = Math.min(parseInt(document.getElementById('qrCount').value) || 1, 200);
  const start = parseInt(document.getElementById('qrStart').value) || 1;

  // Etiketten in DB anlegen (unique constraint verhindert Doppelungen)
  const rows = Array.from({ length: count }, (_, i) => ({
    pfluecker_nr: qrEmployee.mitarbeiter_nr,
    lfd_nr: start + i
  }));
  try {
    await fetch(`${SB_URL}/rest/v1/etiketten`, {
      method: 'POST',
      headers: { ...sbHeaders(), 'Prefer': 'return=minimal,resolution=ignore-duplicates' },
      body: JSON.stringify(rows)
    });
  } catch(e) {
    if (!confirm(`Etiketten konnten nicht gespeichert werden:\n${e.message}\n\nTrotzdem drucken?`)) return;
  }

  // Druckseite aufbauen
  const sheet = document.getElementById('labelSheet');
  sheet.innerHTML = '';
  for (let i = 0; i < count; i++) {
    const { qr, name, ma, lfd } = buildLabelHTML(qrEmployee, start + i);
    const label = document.createElement('div');
    label.className = 'label';
    const qrDiv = document.createElement('div');
    qrDiv.className = 'label-qr';
    label.appendChild(qrDiv);
    const text = document.createElement('div');
    text.className = 'label-text';
    text.innerHTML = `<div class="label-name">${esc(name)}</div>
      <div class="label-ma">${ma}</div>
      <div class="label-lfd">Etik. ${lfd}</div>
      <div class="label-app">Harvio</div>`;
    label.appendChild(text);
    sheet.appendChild(label);
    new QRCode(qrDiv, { text: qr, width: 80, height: 80, correctLevel: QRCode.CorrectLevel.M });
  }
  closeQR();
  setTimeout(() => window.print(), 400);
}

// ── PROTOKOLL ────────────────────────────────────────────────
let protoEditId = null;

function setProtoRange(preset) {
  const today = new Date();
  const fmt = d => d.toISOString().slice(0,10);
  document.querySelectorAll('#protokollFilter .btn-quick').forEach(b => b.classList.remove('active'));
  switch(preset) {
    case 'today':
      document.getElementById('proto_von').value = fmt(today);
      document.getElementById('proto_bis').value = fmt(today);
      break;
    case 'week': {
      const mon = new Date(today); mon.setDate(today.getDate() - today.getDay() + 1);
      const sun = new Date(mon); sun.setDate(mon.getDate() + 6);
      document.getElementById('proto_von').value = fmt(mon);
      document.getElementById('proto_bis').value = fmt(sun);
      break;
    }
    case 'month': {
      const first = new Date(today.getFullYear(), today.getMonth(), 1);
      const last  = new Date(today.getFullYear(), today.getMonth() + 1, 0);
      document.getElementById('proto_von').value = fmt(first);
      document.getElementById('proto_bis').value = fmt(last);
      break;
    }
    case 'all':
      document.getElementById('proto_von').value = '';
      document.getElementById('proto_bis').value = '';
      break;
  }
  document.querySelector(`#protokollFilter .btn-quick[onclick="setProtoRange('${preset}')"]`)?.classList.add('active');
  loadProtokoll();
}

async function initProtokoll() {
  // Beim ersten Aufruf: Datum auf diese Woche setzen und Dropdowns füllen
  if (!document.getElementById('proto_von').value) {
    setProtoRange('week');
    return; // setProtoRange ruft loadProtokoll auf
  }
  // Felder- und Pflücker-Dropdowns befüllen
  await Promise.all([
    cache.felder.length      || sbGet('felder',      'order=name&select=id,name').then(r => { cache.felder = r; }),
    cache.sorten.length      || sbGet('sorten',      'order=name&select=id,name').then(r => { cache.sorten = r; }),
    cache.qualitaeten.length || sbGet('qualitaeten', 'order=sort_order&select=id,code,label').then(r => { cache.qualitaeten = r; }),
    cache.gebinde.length     || sbGet('gebinde',     'order=sort_order&select=id,label').then(r => { cache.gebinde = r; }),
    cache.mitarbeiter.length || sbGet('pfluecker',   'order=mitarbeiter_nr&select=id,name').then(r => { cache.mitarbeiter = r; }),
  ]);
  await loadProtokoll();
}

async function loadProtokoll() {
  const von = document.getElementById('proto_von').value;
  const bis = document.getElementById('proto_bis').value;
  const feld = document.getElementById('proto_feld').value;
  const pfluecker = document.getElementById('proto_pfluecker').value;

  document.getElementById('tableContainer').innerHTML =
    '<table><thead><tr><th colspan="10" style="text-align:center;padding:24px;color:var(--dim)">Lade…</th></tr></thead></table>';

  let qs = 'select=id,datum,uhrzeit,menge,reihe,etiketten_id,pfluecker:pfluecker_id(id,name),feld:feld_id(id,name),sorte:sorte_id(id,name),gebinde:gebinde_id(id,label,gewicht_kg)&order=datum.desc,uhrzeit.desc&limit=500';
  if (von)       qs += `&datum=gte.${von}`;
  if (bis)       qs += `&datum=lte.${bis}`;
  if (feld)      qs += `&feld_id=eq.${feld}`;
  if (pfluecker) qs += `&pfluecker_id=eq.${pfluecker}`;

  try {
    const data = await sbGet('ernteeintraege', qs);
    const countEl = document.getElementById('rowCount');
    if (countEl) countEl.textContent = ` · ${data.length} Einträge`;
    // Dropdowns mit vorhandenen Werten füllen
    fillProtoDropdowns(data);
    renderProtokollTable(data);
  } catch(e) {
    document.getElementById('tableContainer').innerHTML =
      `<table><thead><tr><th colspan="10" style="text-align:center;padding:24px;color:var(--red)">Fehler: ${esc(e.message)}</th></tr></thead></table>`;
  }
}

function fillProtoDropdowns(data) {
  // Eindeutige Felder und Pflücker aus den geladenen Daten (als Objekte mit id+name)
  const felderSeen = new Map(); data.forEach(r => r.feld && felderSeen.set(r.feld.id, r.feld.name));
  const pflSeen    = new Map(); data.forEach(r => r.pfluecker && pflSeen.set(r.pfluecker.id, r.pfluecker.name));
  const curFeld = document.getElementById('proto_feld').value;
  const curPfl  = document.getElementById('proto_pfluecker').value;
  document.getElementById('proto_feld').innerHTML =
    `<option value="">Alle Felder</option>` +
    [...felderSeen.entries()].sort((a,b)=>a[1].localeCompare(b[1]))
      .map(([id,name]) => `<option ${id==curFeld?'selected':''} value="${id}">${esc(name)}</option>`).join('');
  document.getElementById('proto_pfluecker').innerHTML =
    `<option value="">Alle Pflücker</option>` +
    [...pflSeen.entries()].sort((a,b)=>a[1].localeCompare(b[1]))
      .map(([id,name]) => `<option ${id==curPfl?'selected':''} value="${id}">${esc(name)}</option>`).join('');
}

function qualBadge(q) {
  const cls = q === 'A' ? 'badge-qual-A' : q === 'B' ? 'badge-qual-B' : q === 'C' ? 'badge-qual-C' : '';
  return `<span class="badge-qual ${cls}">${esc(q||'–')}</span>`;
}

function renderProtokollTable(data) {
  if (!data.length) {
    document.getElementById('tableContainer').innerHTML =
      '<table><thead><tr><th colspan="10" style="text-align:center;padding:32px;color:var(--dim)">Keine Einträge im gewählten Zeitraum</th></tr></thead></table>';
    return;
  }
  const rows = data.map(r => `<tr>
    <td style="white-space:nowrap">${esc(r.datum||'–')}</td>
    <td style="color:var(--dim);font-size:13px">${esc(r.uhrzeit||'–')}</td>
    <td style="font-weight:600">${esc(r.pfluecker?.name||'–')}</td>
    <td>${esc(r.feld?.name||'–')}</td>
    <td style="color:var(--dim)">${esc(r.sorte?.name||'–')}</td>
    <td style="color:var(--dim);font-size:13px">${esc(r.gebinde?.label||'–')}</td>
    <td style="font-weight:600;font-family:monospace">${r.gebinde?.gewicht_kg != null ? (parseFloat(r.menge||1) * r.gebinde.gewicht_kg).toFixed(1)+' kg' : (parseFloat(r.menge||1)+'×')}</td>
    <td style="color:var(--dim);font-family:monospace;font-size:12px">${r.etiketten_id != null ? '#'+r.etiketten_id : '–'}</td>
    <td><div class="actions">
      <button class="btn-icon" onclick="openProtoEdit(${r.id})" data-tip="Bearbeiten">✏️</button>
      <button class="btn-icon del proto-del-btn" onclick="deleteProtoEntry(${r.id})" data-tip="Eintrag löschen">🗑</button>
    </div></td>
  </tr>`).join('');
  document.getElementById('tableContainer').innerHTML = `<table>
    <thead><tr>
      <th>Datum</th><th>Zeit</th><th>Pflücker</th><th>Feld</th><th>Sorte</th>
      <th>Korbtyp</th><th>Gewicht</th><th>QR-Nr.</th><th>Aktionen</th>
    </tr></thead>
    <tbody>${rows}</tbody>
  </table>`;
  // Summe unten anzeigen
  const totalKg = data.reduce((s,r) => s + (r.gebinde?.gewicht_kg != null ? parseFloat(r.menge||1) * r.gebinde.gewicht_kg : 0), 0);
  const countEl = document.getElementById('rowCount');
  if (countEl) countEl.textContent = ` · ${data.length} Einträge · ${totalKg.toFixed(1)} kg gesamt`;
}

function openProtoEdit(id) {
  // Daten aus dem DOM holen: Da wir keine Cache-Kopie der Protokoll-Daten haben,
  // holen wir den Eintrag direkt aus Supabase
  protoEditId = id;
  sbGet('ernteeintraege', `id=eq.${id}&select=id,datum,uhrzeit,pfluecker_id,feld_id,sorte_id,gebinde_id,menge&limit=1`)
    .then(rows => {
      if (!rows.length) return;
      const r = rows[0];
      document.getElementById('pe_datum').value   = r.datum || '';
      document.getElementById('pe_uhrzeit').value = r.uhrzeit || '';
      document.getElementById('pe_menge').value   = r.menge != null ? r.menge : 1;
      // Selects befüllen und aktuellen Wert setzen
      const opt = (arr, valKey, labelKey, cur) =>
        `<option value="">– bitte wählen –</option>` +
        arr.map(x => `<option value="${x[valKey]}" ${x[valKey]==cur?'selected':''}>${esc(x[labelKey])}</option>`).join('');
      document.getElementById('pe_pfluecker_id').innerHTML = opt(cache.mitarbeiter, 'id', 'name',  r.pfluecker_id);
      document.getElementById('pe_feld_id').innerHTML      = opt(cache.felder,      'id', 'name',  r.feld_id);
      document.getElementById('pe_sorte_id').innerHTML     = `<option value="">– keine –</option>` +
        cache.sorten.map(s => `<option value="${s.id}" ${s.id==r.sorte_id?'selected':''}>${esc(s.name)}</option>`).join('');
      document.getElementById('pe_gebinde_id').innerHTML   = opt(cache.gebinde,     'id', 'label', r.gebinde_id);
      document.getElementById('protoEditOverlay').classList.remove('hidden');
      document.getElementById('pe_menge').focus();
    })
    .catch(e => alert('Fehler beim Laden: ' + e.message));
}

function closeProtoEdit() {
  protoEditId = null;
  document.getElementById('protoEditOverlay').classList.add('hidden');
}

async function saveProtoEdit() {
  if (!protoEditId) return;
  const datum = document.getElementById('pe_datum').value;
  const menge = parseFloat(document.getElementById('pe_menge').value);
  if (!datum)               { alert('Datum ist erforderlich.'); return; }
  if (isNaN(menge) || menge <= 0) { alert('Bitte gültige Menge eingeben.'); return; }
  const uhrzeit = document.getElementById('pe_uhrzeit').value || null;
  const stunde  = uhrzeit ? parseInt(uhrzeit.split(':')[0]) : null;
  const intVal = id => { const v = document.getElementById(id).value; return v ? parseInt(v) : null; };
  const data = {
    datum, uhrzeit, stunde,
    pfluecker_id: intVal('pe_pfluecker_id'),
    feld_id:      intVal('pe_feld_id'),
    sorte_id:     intVal('pe_sorte_id'),
    gebinde_id:   intVal('pe_gebinde_id'),
    menge,
  };
  try {
    await sbPatch('ernteeintraege', protoEditId, data);
    closeProtoEdit();
    await loadProtokoll();
  } catch(e) {
    alert('Fehler beim Speichern: ' + e.message);
  }
}

async function deleteProtoEntry(id) {
  if (!confirm('Eintrag wirklich löschen? Diese Aktion kann nicht rückgängig gemacht werden.')) return;
  try {
    await sbDelete('ernteeintraege', id);
    await loadProtokoll();
  } catch(e) {
    alert('Fehler beim Löschen: ' + e.message);
  }
}

// ── DASHBOARD ────────────────────────────────────────────────
function setDashRange(preset) {
  const today = new Date();
  const fmt = d => d.toISOString().slice(0,10);
  document.querySelectorAll('.btn-quick').forEach(b => b.classList.remove('active'));
  switch(preset) {
    case 'today':
      document.getElementById('dash_von').value = fmt(today);
      document.getElementById('dash_bis').value = fmt(today);
      break;
    case 'week': {
      const mon = new Date(today); mon.setDate(today.getDate() - today.getDay() + 1);
      const sun = new Date(mon); sun.setDate(mon.getDate() + 6);
      document.getElementById('dash_von').value = fmt(mon);
      document.getElementById('dash_bis').value = fmt(sun);
      break;
    }
    case 'month': {
      const first = new Date(today.getFullYear(), today.getMonth(), 1);
      const last  = new Date(today.getFullYear(), today.getMonth() + 1, 0);
      document.getElementById('dash_von').value = fmt(first);
      document.getElementById('dash_bis').value = fmt(last);
      break;
    }
    case 'all':
      document.getElementById('dash_von').value = '';
      document.getElementById('dash_bis').value = '';
      break;
  }
  document.querySelector(`.btn-quick[onclick="setDashRange('${preset}')"]`)?.classList.add('active');
  loadAuswertung();
}

async function loadAuswertung() {
  const von = document.getElementById('dash_von').value;
  const bis = document.getElementById('dash_bis').value;
  document.getElementById('tableContainer').innerHTML =
    '<div class="dash-empty">Lade Auswertung…</div>';
  let qs = 'select=datum,stunde,menge,pfluecker:pfluecker_id(name),feld:feld_id(name),sorte:sorte_id(name),qualitaet:qualitaet_id(code),gebinde:gebinde_id(label,gewicht_kg)&order=datum.desc&limit=5000';
  if (von) qs += `&datum=gte.${von}`;
  if (bis) qs += `&datum=lte.${bis}`;
  try {
    const data = await sbGet('ernteeintraege', qs);
    const countEl = document.getElementById('rowCount');
    if (countEl) countEl.textContent = ` · ${data.length} Einträge`;
    renderDashboard(data);
  } catch(e) {
    document.getElementById('tableContainer').innerHTML =
      `<div class="dash-empty" style="color:var(--red)">Fehler: ${esc(e.message)}</div>`;
  }
}

function rowKg(r) {
  return r.gebinde?.gewicht_kg != null ? parseFloat(r.menge || 1) * r.gebinde.gewicht_kg : 0;
}

function agg(data, keyFn) {
  const map = {};
  data.forEach(r => {
    const k = keyFn(r) || '–';
    if (!map[k]) map[k] = { kg: 0, gebinde: 0 };
    map[k].kg      += rowKg(r);
    map[k].gebinde += parseFloat(r.menge || 1);
  });
  return Object.entries(map).sort((a,b) => b[1].kg - a[1].kg);
}

function isoWeek(dateStr) {
  const d = new Date(dateStr);
  const jan4 = new Date(d.getFullYear(), 0, 4);
  const startOfW1 = new Date(jan4);
  startOfW1.setDate(jan4.getDate() - (jan4.getDay() || 7) + 1);
  const diff = (d - startOfW1) / 86400000;
  const week = Math.floor(diff / 7) + 1;
  return `KW ${String(week).padStart(2,'0')} / ${d.getFullYear()}`;
}

function barRows(entries, metric, color='') {
  if (!entries.length) return `<div class="dash-empty">Keine Daten</div>`;
  const maxVal = Math.max(...entries.map(([,v]) => v[metric]));
  return entries.map(([label, v]) => {
    const val  = v[metric];
    const pct  = maxVal ? (val / maxVal * 100).toFixed(1) : 0;
    const disp = metric === 'kg' ? val.toFixed(1) + ' kg' : val + ' Geb.';
    return `<div class="bar-row">
      <div class="bar-label" title="${esc(label)}">${esc(label)}</div>
      <div class="bar-track">
        <div class="bar-fill ${color}" style="width:${pct}%"></div>
        <span class="bar-val">${disp}</span>
      </div>
    </div>`;
  }).join('');
}

function dashCard(icon, title, content) {
  return `<div class="dash-card">
    <div class="dash-card-title"><span>${icon}</span>${esc(title)}</div>
    ${content}
  </div>`;
}

function renderDashboard(data) {
  if (!data.length) {
    document.getElementById('tableContainer').innerHTML =
      '<div class="dash-empty" style="padding:48px">Keine Ernteeinträge im gewählten Zeitraum.</div>';
    return;
  }

  const totalKg      = data.reduce((s,r) => s + rowKg(r), 0);
  const totalGebinde = data.reduce((s,r) => s + parseFloat(r.menge || 1), 0);
  const avgKg        = totalGebinde ? totalKg / totalGebinde : 0;
  const pflSet       = new Set(data.map(r => r.pfluecker?.name).filter(Boolean));
  const feldSet      = new Set(data.map(r => r.feld?.name).filter(Boolean));

  // Heute vs. Vortag für KPI-Trend
  const today = new Date().toISOString().slice(0,10);
  const kgHeute = data.filter(r => r.datum === today).reduce((s,r) => s + rowKg(r), 0);

  const byFeld      = agg(data, r => r.feld?.name);
  const byPfluecker = agg(data, r => r.pfluecker?.name);
  const byQual      = agg(data, r => r.qualitaet?.code);
  const bySorte     = agg(data, r => r.sorte?.name);
  const byTag       = agg(data, r => r.datum).sort((a,b) => b[0].localeCompare(a[0])).slice(0,14);
  const byWoche     = agg(data, r => isoWeek(r.datum)).slice(0,8);
  const byStunde    = agg(data, r => r.stunde != null ? String(r.stunde).padStart(2,'0') + ':00 Uhr' : null)
                        .sort((a,b) => a[0].localeCompare(b[0]));

  const kpiHTML = `<div class="kpi-grid">
    <div class="kpi-card">
      <div class="kpi-label">Gesamt Ernte</div>
      <div class="kpi-value">${totalKg.toFixed(1)}<small> kg</small></div>
      <div class="kpi-sub">${kgHeute > 0 ? 'Heute: ' + kgHeute.toFixed(1) + ' kg' : 'Heute: keine Einträge'}</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">Gebinde gesamt</div>
      <div class="kpi-value">${totalGebinde}<small> Stk.</small></div>
      <div class="kpi-sub">Ø ${avgKg.toFixed(2)} kg / Gebinde</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">Aktive Pflücker</div>
      <div class="kpi-value">${pflSet.size}</div>
      <div class="kpi-sub">Ø ${(totalKg / pflSet.size).toFixed(1)} kg / Person</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">Felder</div>
      <div class="kpi-value">${feldSet.size}</div>
      <div class="kpi-sub">Zeitraum: ${data[data.length-1]?.datum || '–'} – ${data[0]?.datum || '–'}</div>
    </div>
  </div>`;

  const row1 = `<div class="dash-grid">
    ${dashCard('🗺️', 'Ernte nach Feld (kg)', barRows(byFeld, 'kg'))}
    ${dashCard('👤', 'Ernte nach Pflücker (kg)', barRows(byPfluecker, 'kg', 'blue'))}
  </div>`;

  const row2 = `<div class="dash-grid">
    ${dashCard('📅', 'Ernte nach Tag (letzte 14 Tage)', barRows(byTag, 'kg'))}
    ${dashCard('📆', 'Ernte nach Kalenderwoche', barRows(byWoche, 'kg', 'green'))}
  </div>`;

  const row3 = `<div class="dash-grid">
    ${dashCard('⭐', 'Verteilung nach Qualität', barRows(byQual, 'gebinde', 'orange'))}
    ${dashCard('🌱', 'Ernte nach Sorte (kg)', barRows(bySorte, 'kg'))}
  </div>`;

  const row4 = byStunde.length ? `<div class="dash-grid">
    ${dashCard('🕐', 'Gebinde nach Tageszeit (Stunde)', barRows(byStunde, 'gebinde', 'blue'))}
    ${dashCard('🗺️', 'Gebinde nach Feld', barRows(byFeld, 'gebinde'))}
  </div>` : '';

  document.getElementById('tableContainer').innerHTML = kpiHTML + row1 + row2 + row3 + row4;
}

// ── PASSWORT ÄNDERN ──────────────────────────────────────────
function openChangePassword() {
  document.getElementById('pw_new').value = '';
  document.getElementById('pw_confirm').value = '';
  document.getElementById('pwOverlay').classList.remove('hidden');
  setTimeout(() => document.getElementById('pw_new').focus(), 50);
}
function closePW() {
  document.getElementById('pwOverlay').classList.add('hidden');
}
async function saveChangePassword() {
  const pw1 = document.getElementById('pw_new').value;
  const pw2 = document.getElementById('pw_confirm').value;
  if (!pw1) { alert('Bitte neues Passwort eingeben.'); return; }
  if (pw1.length < 6) { alert('Passwort mindestens 6 Zeichen.'); return; }
  if (pw1 !== pw2) { alert('Passwörter stimmen nicht überein.'); return; }
  try {
    const res = await fetch(`${SB_URL}/auth/v1/user`, {
      method: 'PUT',
      headers: { 'apikey': SB_KEY, 'Authorization': `Bearer ${session?.access_token}`, 'Content-Type': 'application/json' },
      body: JSON.stringify({ password: pw1 })
    });
    if (!res.ok) { const d = await res.json(); throw new Error(d.error_description || d.msg || 'Fehler'); }
    closePW();
    alert('Passwort erfolgreich geändert.');
  } catch(e) {
    alert('Fehler: ' + e.message);
  }
}

// ── UTILS ────────────────────────────────────────────────────
function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── INIT ─────────────────────────────────────────────────────
checkAuth();
</script>
